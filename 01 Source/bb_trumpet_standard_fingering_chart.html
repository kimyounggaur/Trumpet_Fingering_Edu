<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B♭ 트럼펫 표준 운지표</title>
<meta name="description" content="B♭ 3밸브 트럼펫의 기보 F♯3부터 C6까지 표준 주운지와 대표 대체 운지를 제공하는 인터랙티브 운지표입니다.">
<style>
:root { color-scheme: light; --navy:#15243A; --gold:#C9972B; --red:#C62828; --muted:#667085; --line:#D8DEE8; --panel:#F7F9FC; }
* { box-sizing:border-box; }
body { margin:0; font-family:"NanumSquareRound","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif; background:#EEF2F6; color:#17202A; }
.app { max-width:1680px; margin:0 auto; padding:24px; }
.toolbar { display:grid; grid-template-columns:minmax(260px,1fr) auto auto; gap:14px; align-items:end; background:white; border:1px solid var(--line); border-radius:18px; padding:18px 20px; box-shadow:0 10px 28px rgba(21,36,58,.08); margin-bottom:16px; }
.toolbar h1 { margin:0 0 4px; font-size:24px; color:var(--navy); }
.toolbar p { margin:0; color:var(--muted); font-size:14px; }
.controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
label.control { display:flex; flex-direction:column; gap:5px; color:var(--muted); font-size:12px; font-weight:700; }
select,button { height:42px; border-radius:12px; border:1px solid var(--line); background:white; color:var(--navy); padding:0 13px; font:700 14px inherit; }
select { min-width:210px; }
button { cursor:pointer; }
button.primary { background:var(--navy); color:white; border-color:var(--navy); }
.toggle { display:flex; align-items:center; gap:8px; height:42px; padding:0 12px; border:1px solid var(--line); border-radius:12px; font-size:14px; font-weight:700; color:var(--navy); background:white; }
.toggle input { width:18px; height:18px; accent-color:var(--red); }
.detail { display:grid; grid-template-columns:1.2fr 1fr 1fr 1.5fr; gap:14px; background:white; border:1px solid var(--line); border-radius:18px; padding:16px 20px; box-shadow:0 10px 28px rgba(21,36,58,.06); margin-bottom:16px; }
.detail-card { min-height:96px; border-radius:14px; background:var(--panel); border:1px solid #E5EAF1; padding:13px 15px; }
.detail-label { color:var(--muted); font-size:12px; font-weight:700; margin-bottom:6px; }
.detail-value { color:var(--navy); font-size:24px; font-weight:800; letter-spacing:-.3px; }
.detail-sub { color:var(--muted); font-size:13px; margin-top:4px; }
.valves-large { display:flex; gap:9px; align-items:center; min-height:44px; }
.valve-large { width:38px; height:38px; border-radius:50%; display:grid; place-items:center; border:2px solid #AAB4C2; color:var(--navy); background:white; font-weight:800; }
.valve-large.on { background:var(--red); border-color:#9C1F1F; color:white; }
.alt-chips { display:flex; flex-wrap:wrap; gap:7px; }
.alt-chip { padding:7px 10px; border-radius:999px; background:#F4E8C8; border:1px solid var(--gold); color:#7C5200; font-weight:800; font-size:13px; }
.sheet { background:white; border:1px solid var(--line); border-radius:18px; overflow:auto; box-shadow:0 14px 40px rgba(21,36,58,.09); }
.sheet svg { display:block; width:100%; min-width:1040px; height:auto; }
.hint { margin:10px 4px 0; color:var(--muted); font-size:13px; }
@media (max-width:1050px) {
  .toolbar { grid-template-columns:1fr; align-items:start; }
  .detail { grid-template-columns:1fr 1fr; }
}
@media (max-width:650px) {
  .app { padding:12px; }
  .detail { grid-template-columns:1fr; }
  .controls { align-items:stretch; }
  select,button,.toggle { width:100%; }
}
@media print {
  @page { size:A4 landscape; margin:0; }
  body { background:white; }
  .app { margin:0; padding:0; max-width:none; }
  .toolbar,.detail,.hint { display:none !important; }
  .sheet { width:297mm; height:210mm; border:0; border-radius:0; box-shadow:none; overflow:hidden; }
  .sheet svg { width:297mm; height:210mm; min-width:0; }
  .note-item.selected .note-highlight, .note-item:hover .note-highlight, .note-item:focus .note-highlight { fill:transparent !important; stroke:transparent !important; }
}
</style>
</head>

let selectedIndex=0;

function valveHTML(pressed) {
  return [1,2,3].map(v=>`<span class="valve-large ${pressed.includes(v)?'on':''}">${v}</span>`).join('');
}
function choose(index, scroll=false) {
  index=Math.max(0,Math.min(NOTES.length-1,Number(index)||0));
  selectedIndex=index;
  select.value=String(index);
  svg.querySelectorAll('.note-item.selected').forEach(el=>el.classList.remove('selected'));
  const group=svg.querySelector(`[data-note-index="${index}"]`);
  if(group) {
    group.classList.add('selected');
    if(scroll) group.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
  const n=NOTES[index];
  detailNote.textContent=n.display;
  detailSolfege.textContent='계이름: '+n.solfege;
  detailValves.innerHTML=valveHTML(n.primary);
  detailPrimary.textContent=n.primaryText;
  detailAlts.innerHTML=n.alts.length?n.alts.map(a=>`<span class="alt-chip">${a.length?a.join('-'):'0 (오픈)'}</span>`).join(''):'';
  detailAltNote.textContent=n.alts.length?'빠른 패시지·음정·음색에 따라 선택':'표준 주운지만 사용';
  detailConcert.textContent=n.concert;
}
svg.querySelectorAll('.note-item').forEach(group=>{

  group.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();choose(idx);}
    if(ev.key==='ArrowRight'){ev.preventDefault();choose(idx+1,true);}
    if(ev.key==='ArrowLeft'){ev.preventDefault();choose(idx-1,true);}
  });
});
select.addEventListener('change',()=>choose(select.value,true));
altToggle.addEventListener('change',()=>svg.classList.toggle('hide-alt',!altToggle.checked));
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.addEventListener('keydown',ev=>{
  if(ev.target.matches('select,input,button')) return;
  if(ev.key==='ArrowRight'){ev.preventDefault();choose(selectedIndex+1,true);}
  if(ev.key==='ArrowLeft'){ev.preventDefault();choose(selectedIndex-1,true);}
});
choose(0);
</script>
</body>
