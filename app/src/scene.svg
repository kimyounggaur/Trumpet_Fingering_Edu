<svg id="trumpet-scene" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="scene-title scene-desc" preserveAspectRatio="xMidYMid meet">
  <title id="scene-title">B♭ 트럼펫과 양손 운지</title>
  <desc id="scene-desc">오른손 검지, 중지, 약지가 각각 1번, 2번, 3번 피스톤과 함께 움직이며 선택한 운지를 보여줍니다.</desc>
  <defs>
    <linearGradient id="scene-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a28"/>
      <stop offset="1" stop-color="#204540"/>
    </linearGradient>
    <linearGradient id="scene-brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0ae"/>
      <stop offset=".28" stop-color="#e1bd4e"/>
      <stop offset=".62" stop-color="#b08218"/>
      <stop offset="1" stop-color="#765414"/>
    </linearGradient>
    <linearGradient id="scene-brass-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe89a"/>
      <stop offset=".48" stop-color="#c39424"/>
      <stop offset="1" stop-color="#6c4b0f"/>
    </linearGradient>
    <linearGradient id="scene-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe8d3"/>
      <stop offset=".55" stop-color="#f0c19a"/>
      <stop offset="1" stop-color="#d59165"/>
    </linearGradient>
    <linearGradient id="scene-skin-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6aa7f"/>
      <stop offset=".58" stop-color="#f5ceb0"/>
      <stop offset="1" stop-color="#c97f58"/>
    </linearGradient>
    <linearGradient id="scene-pearl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#d8e1e1"/>
    </linearGradient>
    <filter id="scene-shadow" x="-20%" y="-20%" width="150%" height="165%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#041312" flood-opacity=".36"/>
    </filter>
    <filter id="hand-shadow" x="-25%" y="-25%" width="175%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#071b1a" flood-opacity=".32"/>
    </filter>
    <style>
      #trumpet-scene { display:block; width:100%; height:auto; shape-rendering:geometricPrecision; }
      #trumpet-scene .skin-outline { stroke:#9d684a; stroke-width:2.5; stroke-linejoin:round; }
      #trumpet-scene .skin-highlight { fill:none; stroke:#fff1e4; stroke-opacity:.42; stroke-linecap:round; }
      #trumpet-scene .joint-crease { fill:none; stroke:#b77857; stroke-width:1.8; stroke-linecap:round; }
      #trumpet-scene .finger-segment { fill:url(#scene-skin); stroke:#9d684a; stroke-width:2.2; stroke-linejoin:round; }
      #trumpet-scene .finger-pad { fill:#f7cba9; stroke:#b87858; stroke-width:1.2; }
      #trumpet-scene .finger-nail { fill:#fce8d7; stroke:#c58f70; stroke-width:1.1; }
      #trumpet-scene .scene-label { fill:#fff6e2; font:700 13px system-ui,sans-serif; letter-spacing:.02em; }
      #trumpet-scene .valve-number { fill:#173b38; font:700 13px system-ui,sans-serif; }
      #trumpet-scene .contact-anchor { opacity:0; pointer-events:none; }
      #trumpet-scene .scene-valve.pressed .valve-cap { fill:#d5ad39; stroke:#6a4b12; }
      #trumpet-scene .finger-rig.pressed .finger-pad { fill:#efb98f; }
      #trumpet-scene.is-reduced-motion * { animation:none !important; transition:none !important; }
    </style>
  </defs>

  <g id="scene-background">
    <rect width="760" height="460" rx="26" fill="url(#scene-bg)"/>
    <path d="M28 381 C164 340 294 360 419 405 C538 448 654 429 732 385" fill="none" stroke="#fff6e2" stroke-opacity=".08" stroke-width="2"/>
    <circle cx="678" cy="73" r="42" fill="#fff" opacity=".025"/>
  </g>

  <g id="scene-left-hand-back" filter="url(#hand-shadow)">
    <path d="M277 317 Q258 357 274 409 Q309 448 400 427 Q430 399 428 351 Q419 317 389 319 Q347 338 315 319 Z" fill="url(#scene-skin-side)" class="skin-outline"/>
    <path d="M310 322 Q300 291 318 276 Q337 272 345 293 L347 329 Z" fill="url(#scene-skin)" class="skin-outline"/>
  </g>

  <g id="scene-trumpet" filter="url(#scene-shadow)">
    <path id="scene-bell" d="M42 241 C92 252 166 273 238 286 L238 320 C166 333 92 354 42 365 C30 346 24 324 24 303 C24 282 30 260 42 241 Z" fill="url(#scene-brass)" stroke="#614713" stroke-width="4"/>
    <ellipse cx="42" cy="303" rx="13" ry="62" fill="#f6d66e" stroke="#614713" stroke-width="4"/>
    <ellipse cx="43" cy="303" rx="7" ry="48" fill="#6e4f13" opacity=".72"/>
    <path d="M61 260 C111 273 168 289 225 297" fill="none" stroke="#fff0a8" stroke-opacity=".62" stroke-width="4" stroke-linecap="round"/>
    <path d="M233 288 H570 Q585 288 585 303 Q585 318 570 318 H233 Z" fill="url(#scene-brass)" stroke="#614713" stroke-width="3"/>
    <path d="M570 292 H662 L690 282 L690 324 L662 314 H570 Z" fill="url(#scene-brass)" stroke="#614713" stroke-width="3"/>
    <path d="M690 290 H729 V316 H690" fill="url(#scene-pearl)" stroke="#314c48" stroke-width="3"/>
    <path d="M170 320 V372 Q170 402 201 402 H244 Q275 402 275 372 V320" fill="none" stroke="url(#scene-brass)" stroke-width="17"/>
    <path d="M177 324 V370 Q177 394 202 394 H241" fill="none" stroke="#ffe89a" stroke-opacity=".55" stroke-width="3"/>

    <g id="scene-valve-casings" fill="url(#scene-brass)" stroke="#614713" stroke-width="3">
      <rect x="302" y="213" width="36" height="165" rx="7"/>
      <rect x="367" y="213" width="36" height="165" rx="7"/>
      <rect x="432" y="213" width="36" height="165" rx="7"/>
    </g>
    <g fill="none" stroke="#ffe9a1" stroke-opacity=".58" stroke-width="4">
      <path d="M311 224 V364"/>
      <path d="M376 224 V364"/>
      <path d="M441 224 V364"/>
    </g>
    <g fill="url(#scene-brass-edge)" stroke="#614713" stroke-width="2">
      <rect x="297" y="207" width="46" height="13" rx="5"/>
      <rect x="362" y="207" width="46" height="13" rx="5"/>
      <rect x="427" y="207" width="46" height="13" rx="5"/>
      <rect x="297" y="371" width="46" height="13" rx="5"/>
      <rect x="362" y="371" width="46" height="13" rx="5"/>
      <rect x="427" y="371" width="46" height="13" rx="5"/>
    </g>

    <g id="scene-slide-3" data-progress="0" transform="translate(0 0)">
      <path d="M304 327 H257 Q236 327 236 349 Q236 370 257 370 H304" fill="none" stroke="url(#scene-brass)" stroke-width="13"/>
      <circle cx="246" cy="316" r="17" fill="none" stroke="#d2aa36" stroke-width="6"/>
      <circle cx="246" cy="316" r=".4" class="contact-anchor" data-slide-contact="3"/>
    </g>
    <path d="M466 253 Q501 255 501 281 Q501 307 468 310" fill="none" stroke="#d3aa37" stroke-width="8"/>

    <g id="scene-valve-3" class="scene-valve" data-valve="3" data-progress="0" transform="translate(0 0)">
      <rect x="315" y="179" width="10" height="38" rx="4" fill="#76908b"/>
      <circle class="valve-cap" cx="320" cy="165" r="18" fill="url(#scene-pearl)" stroke="#314c48" stroke-width="4"/>
      <circle cx="320" cy="165" r=".4" class="contact-anchor" data-cap-center="3"/>
      <circle cx="320" cy="148" r=".4" class="contact-anchor" data-cap-contact="3"/>
      <text x="320" y="171" class="valve-number" text-anchor="middle">3</text>
    </g>
    <g id="scene-valve-2" class="scene-valve" data-valve="2" data-progress="0" transform="translate(0 0)">
      <rect x="380" y="179" width="10" height="38" rx="4" fill="#76908b"/>
      <circle class="valve-cap" cx="385" cy="165" r="18" fill="url(#scene-pearl)" stroke="#314c48" stroke-width="4"/>
      <circle cx="385" cy="165" r=".4" class="contact-anchor" data-cap-center="2"/>
      <circle cx="385" cy="148" r=".4" class="contact-anchor" data-cap-contact="2"/>
      <text x="385" y="171" class="valve-number" text-anchor="middle">2</text>
    </g>
    <g id="scene-valve-1" class="scene-valve" data-valve="1" data-progress="0" transform="translate(0 0)">
      <rect x="445" y="179" width="10" height="38" rx="4" fill="#76908b"/>
      <circle class="valve-cap" cx="450" cy="165" r="18" fill="url(#scene-pearl)" stroke="#314c48" stroke-width="4"/>
      <circle cx="450" cy="165" r=".4" class="contact-anchor" data-cap-center="1"/>
      <circle cx="450" cy="148" r=".4" class="contact-anchor" data-cap-contact="1"/>
      <text x="450" y="171" class="valve-number" text-anchor="middle">1</text>
    </g>
  </g>

  <g id="scene-left-hand" filter="url(#hand-shadow)">
    <path d="M284 326 Q264 359 280 408 Q318 440 402 421 Q428 391 420 344 Q408 322 388 327 Q351 359 315 323 Z" fill="url(#scene-skin)" class="skin-outline"/>
    <path d="M421 340 Q451 317 447 282 Q437 264 423 276 Q416 306 399 329 Z" fill="url(#scene-skin)" class="skin-outline"/>
    <path d="M304 331 Q274 319 259 341 Q253 365 272 379 Q290 382 306 367 Z" fill="url(#scene-skin-side)" class="skin-outline"/>
    <path d="M304 389 Q342 402 386 384" class="joint-crease" stroke-width="2"/>
    <path d="M291 348 Q320 360 350 347" class="skin-highlight" stroke-width="4"/>

    <g id="scene-lh-ring" class="left-ring-rig" data-progress="0" transform="translate(291 329)">
      <g class="joint-mcp" data-joint="mcp" transform="rotate(-208.6761)">
        <path d="M-5 -9 Q14 -13 38 -8 L38 8 Q14 13 -5 9 Z" class="finger-segment"/>
        <path d="M0 -5 Q16 -8 28 -5" class="skin-highlight" stroke-width="3"/>
        <g transform="translate(33 0)">
          <g class="joint-pip" data-joint="pip" transform="rotate(89.5791)">
            <path d="M-6 -8 Q14 -11 36 -7 L36 7 Q14 11 -6 8 Z" class="finger-segment"/>
            <ellipse cx="32" cy="0" rx="7" ry="9" class="finger-pad"/>
            <ellipse cx="23" cy="-4" rx="6" ry="3.6" class="finger-nail"/>
            <circle cx="33" cy="0" r=".4" class="contact-anchor" data-tip="slide-3"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <g id="scene-right-hand" filter="url(#hand-shadow)">
    <g id="scene-right-hand-base">
      <path d="M724 34 Q664 24 608 46 Q558 66 523 98 Q508 125 522 171 Q553 207 614 204 Q673 184 724 154 Z" fill="url(#scene-skin)" class="skin-outline" stroke-width="3"/>
      <path d="M724 34 H760 V168 Q742 162 724 154 Z" fill="url(#scene-skin)" class="skin-outline" stroke-width="3"/>
      <path d="M548 174 Q525 202 536 230 Q549 244 565 226 Q570 201 573 182 Z" fill="url(#scene-skin-side)" class="skin-outline"/>
      <path d="M625 187 Q608 219 576 232 Q545 242 516 226 Q507 215 518 207 Q558 215 602 177 Z" fill="url(#scene-skin)" class="skin-outline"/>
      <path d="M538 113 Q577 72 626 59" class="skin-highlight" stroke-width="6"/>
      <path d="M581 190 Q608 181 632 164" class="joint-crease" stroke-width="2"/>
    </g>

    <g id="scene-right-hand-fingers">
      <g id="scene-finger-ring" class="finger-rig" data-valve="3" data-progress="0" transform="translate(525 101)">
        <g class="joint-mcp" data-joint="mcp" transform="rotate(183.0768)">
          <path d="M-8 -19 C20 -23 54 -22 85 -16 L85 16 C53 23 18 23 -8 19 Z" class="finger-segment"/>
          <path d="M0 -12 C25 -16 50 -15 68 -11" class="skin-highlight" stroke-width="5"/>
          <path d="M60 12 q9 -5 18 0" class="joint-crease"/>
          <g transform="translate(78 0)">
            <g class="joint-pip" data-joint="pip" transform="rotate(-15.0977)">
              <path d="M-8 -18 C20 -22 54 -21 89 -14 L89 14 C54 21 20 22 -8 18 Z" class="finger-segment"/>
              <path d="M2 -11 C28 -15 53 -14 70 -10" class="skin-highlight" stroke-width="4.5"/>
              <path d="M63 12 q9 -5 18 0" class="joint-crease"/>
              <g transform="translate(82 0)">
                <g class="joint-dip" data-joint="dip" transform="rotate(-24)">
                  <path d="M-8 -16 C14 -20 39 -18 58 -10 Q65 0 58 10 C38 18 14 20 -8 16 Z" class="finger-segment"/>
                  <path d="M1 -9 C19 -12 35 -11 47 -7" class="skin-highlight" stroke-width="4"/>
                  <ellipse cx="55" cy="0" rx="8" ry="12" class="finger-pad"/>
                  <ellipse cx="40" cy="-7" rx="10" ry="5.5" class="finger-nail"/>
                  <circle cx="58" cy="0" r=".4" class="contact-anchor" data-tip="3"/>
                </g>
              </g>
            </g>
          </g>
        </g>
      </g>

      <g id="scene-finger-middle" class="finger-rig" data-valve="2" data-progress="0" transform="translate(550 88)">
        <g class="joint-mcp" data-joint="mcp" transform="rotate(181.1471)">
          <path d="M-8 -20 C18 -24 48 -23 77 -16 L77 16 C48 23 18 24 -8 20 Z" class="finger-segment"/>
          <path d="M0 -13 C22 -17 45 -16 61 -11" class="skin-highlight" stroke-width="5"/>
          <path d="M52 13 q9 -5 18 0" class="joint-crease"/>
          <g transform="translate(70 0)">
            <g class="joint-pip" data-joint="pip" transform="rotate(-25.2729)">
              <path d="M-8 -18 C18 -22 44 -21 74 -14 L74 14 C45 21 18 22 -8 18 Z" class="finger-segment"/>
              <path d="M1 -11 C23 -15 43 -14 57 -10" class="skin-highlight" stroke-width="4.5"/>
              <path d="M48 12 q9 -5 18 0" class="joint-crease"/>
              <g transform="translate(67 0)">
                <g class="joint-dip" data-joint="dip" transform="rotate(-21)">
                  <path d="M-8 -16 C12 -20 33 -18 48 -10 Q55 0 48 10 C33 18 12 20 -8 16 Z" class="finger-segment"/>
                  <path d="M1 -9 C16 -12 29 -11 38 -7" class="skin-highlight" stroke-width="4"/>
                  <ellipse cx="45" cy="0" rx="8" ry="12" class="finger-pad"/>
                  <ellipse cx="32" cy="-7" rx="9" ry="5" class="finger-nail"/>
                  <circle cx="48" cy="0" r=".4" class="contact-anchor" data-tip="2"/>
                </g>
              </g>
            </g>
          </g>
        </g>
      </g>

      <g id="scene-finger-index" class="finger-rig" data-valve="1" data-progress="0" transform="translate(575 105)">
        <g class="joint-mcp" data-joint="mcp" transform="rotate(187.013)">
          <path d="M-8 -19 C17 -23 42 -22 65 -15 L65 15 C42 22 17 23 -8 19 Z" class="finger-segment"/>
          <path d="M0 -12 C18 -16 37 -15 49 -10" class="skin-highlight" stroke-width="5"/>
          <path d="M40 12 q8 -5 16 0" class="joint-crease"/>
          <g transform="translate(58 0)">
            <g class="joint-pip" data-joint="pip" transform="rotate(-43.9943)">
              <path d="M-8 -17 C15 -21 34 -20 59 -13 L59 13 C35 20 15 21 -8 17 Z" class="finger-segment"/>
              <path d="M1 -10 C17 -14 32 -13 43 -9" class="skin-highlight" stroke-width="4.5"/>
              <path d="M33 11 q8 -5 16 0" class="joint-crease"/>
              <g transform="translate(52 0)">
                <g class="joint-dip" data-joint="dip" transform="rotate(1)">
                  <path d="M-8 -15 C10 -19 22 -17 32 -10 Q39 0 32 10 C22 17 10 19 -8 15 Z" class="finger-segment"/>
                  <path d="M0 -8 C10 -11 18 -10 24 -6" class="skin-highlight" stroke-width="4"/>
                  <ellipse cx="29" cy="0" rx="8" ry="11" class="finger-pad"/>
                  <ellipse cx="19" cy="-6" rx="8" ry="4.5" class="finger-nail"/>
                  <circle cx="32" cy="0" r=".4" class="contact-anchor" data-tip="1"/>
                </g>
              </g>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>

  <g id="scene-overlays" aria-hidden="true">
    <g class="scene-labels">
      <text x="320" y="437" text-anchor="middle" class="scene-label">3 · 약지</text>
      <text x="385" y="437" text-anchor="middle" class="scene-label">2 · 중지</text>
      <text x="450" y="437" text-anchor="middle" class="scene-label">1 · 검지</text>
    </g>
  </g>
</svg>
