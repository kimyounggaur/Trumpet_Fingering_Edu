name: Vercel Auto Deploy

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        shell: bash
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set. Add it in GitHub repository Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm --prefix app ci

      - name: Install Chrome for Playwright
        working-directory: app
        run: npx playwright install chrome

      - name: Run QA
        run: npm --prefix app run qa

      - name: Install Vercel CLI
        run: npm install --global vercel@56.2.0

      - name: Pull Vercel project settings
        shell: bash
        run: |
          environment="preview"
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            environment="production"
          fi
          vercel pull --yes --environment="$environment" --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        shell: bash
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy to Vercel
        id: deploy
        shell: bash
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            deploy_output="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
            target="production"
          else
            deploy_output="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
            target="preview"
          fi

          echo "$deploy_output"
          deploy_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^ ]+\.vercel\.app[^ ]*' | tail -n 1)"
          echo "url=$deploy_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Vercel deployment"
            echo ""
            echo "- Target: $target"
            echo "- URL: $deploy_url"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
